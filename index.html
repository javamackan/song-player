<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChordFlow</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <!-- Header visar låtens titel och en länk till app-guiden. Innan CSV laddas visas en placeholder -->
    <h2 id="songTitle" class="song-title">Titel</h2>
    <!-- Frågetecken-ikon för att öppna app-guiden i ny flik -->
    <a href="usage_guide.html" target="_blank" id="appGuideLink" title="Visa appens guide" class="guide-link">?</a>
  </header>
  <main>
    <!-- wrapper för kontrollpanel och toggle-knapp -->
    <div class="controls-wrapper">
      <!-- Låtval och låtlista -->
      <div id="songControls" class="song-controls">
        <label for="songSelect">Välj låt:</label>
        <select id="songSelect">
          <option value="">-- välj låt --</option>
        </select>
        <button id="loadSong" class="song-btn">Ladda valda låt</button>
      </div>
      <!-- Redigeringspanel: CSV-data och tempo -->
      <div id="editorPanel" class="editor-panel">
        <label for="csvInput">CSV (klistra in):</label>
        <textarea id="csvInput" rows="6" placeholder="Titel,Tempo,Signature\nSection,Bar1,Bar2\nIntro,D .. G,G .. A\nVerse 1,D .. G,Em .. A,D .. G,D .. A"></textarea>
        <label for="tempo">Tempo (BPM):</label>
        <input type="number" id="tempo" min="30" max="300" value="120" />
        <div class="btn-row">
          <button id="load" class="editor-btn">Ladda diagram</button>
          <!-- Länk till syntaxguide för CSV-format -->
          <a href="syntax_guide.html" target="_blank" class="editor-btn" id="guideLink">Syntax&nbsp;guide</a>
        </div>
      </div>
      <!-- Knappar för att fälla editor och kontroller. Dessa visas horisontellt mellan editor och spelarknappar -->
      <div class="collapse-controls">
        <button id="toggleEditor" class="collapse-btn">Dölj editor</button>
        <button id="togglePlayer" class="collapse-btn" title="Dölj kontroller">Dölj kontroller</button>
      </div>
      <!-- Spelarkontroller: föregående, stopp, start, nästa -->
      <div id="playerControls" class="player-controls">
        <button id="prevSong" class="player-btn" title="Föregående låt">⏮</button>
        <button id="stop" class="player-btn" title="Stopp" disabled>⏹</button>
        <button id="start" class="player-btn" title="Start">▶</button>
        <button id="nextSong" class="player-btn" title="Nästa låt">⏭</button>
      </div>
      <!-- Kontrollknappar för metronom, scroll och text -->
      <div id="controlToggles" class="control-toggles">
        <button id="metronomeToggle" class="control-btn" title="Metronom">🔔</button>
        <button id="scrollToggle" class="control-btn" title="Autoscroll">⇆</button>
        <button id="textToggle" class="control-btn" title="Text">𝓣</button>
      </div>
    </div>
    <!-- Aktuellt ackord och cue -->
    <div id="currentChord" class="current-chord"></div>
    <div id="currentCue" class="current-cue"></div>

    <div id="macroFlow" class="macro-flow"></div>
    <div id="microFlow" class="micro-flow">
      <div id="microCurrent" class="micro-row"></div>
      <div id="microNext" class="micro-row"></div>
    </div>

    <!-- Textrad per sektion: visas under ackord och microflow -->
    <div id="sectionText" class="section-text"></div>
  </main>
  <footer>
    <small>Klicka på sektioner eller takter för att navigera och spela upp.</small>
  </footer>
  <script src="script.js"></script>
</body>
</html>
